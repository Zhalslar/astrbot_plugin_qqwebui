<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>QQ WebUI</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="sidebar">
        <div class="sidebar-top">
          <div class="account-strip">
            <div class="account-strip-main">
              <div class="avatar" id="accountAvatar">Q</div>
              <div class="account-strip-copy">
                <div class="account-strip-title">
                  <strong id="accountName">Not connected</strong>
                  <span id="adapterDot" class="status-dot" aria-hidden="true"></span>
                </div>
                <span id="accountMeta">Bind aiocqhttp first</span>
              </div>
            </div>
            <div class="header-actions">
              <button
                id="toggleContactsBtn"
                class="ghost-button icon-button"
                type="button"
                title="Toggle contacts"
                aria-label="Toggle contacts"
              >
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path
                    d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                  ></path>
                  <circle
                    cx="9"
                    cy="7"
                    r="4"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                  ></circle>
                  <path
                    d="M23 21v-2a4 4 0 0 0-3-3.87"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                  ></path>
                  <path
                    d="M16 3.13a4 4 0 0 1 0 7.75"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                  ></path>
                </svg>
              </button>
            </div>
          </div>
          <div class="search-row">
            <button
              id="sidebarPlusBtn"
              class="ghost-button icon-button"
              type="button"
              title="More actions"
              aria-label="More actions"
            >
              <span class="plus-mark" aria-hidden="true">+</span>
            </button>
            <input
              id="sessionSearchInput"
              class="search-input"
              type="search"
              placeholder="Group name / QQ"
            />
          </div>
        </div>

        <div class="sidebar-body">
          <div class="list-title">
            <span id="leftListTitle">Recent sessions</span>
            <strong id="leftListCount">0</strong>
          </div>
          <div id="sessionList" class="session-list empty-state">
            No QQ traffic yet. Send or receive a message first.
          </div>
          <div id="contactList" class="contact-list empty-state is-hidden">
            Contacts will appear automatically.
          </div>
        </div>
      </section>

      <section class="chat-panel">
        <div class="panel-header chat-header">
          <h2 id="chatTitle">Choose a session</h2>
          <button
            id="chatMenuBtn"
            class="ghost-button icon-button"
            type="button"
            title="More chat actions"
            aria-label="More chat actions"
          >
            <span class="menu-mark" aria-hidden="true">...</span>
          </button>
        </div>

        <div class="message-list-shell">
          <button
            id="messageJumpToUnreadBtn"
            class="message-jump-button message-jump-button-top is-hidden"
            type="button"
            title="Jump to previous reading position"
            aria-label="Jump to previous reading position"
          >
            <span id="messageJumpUnreadTop" class="message-jump-unread">0</span>
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path
                d="M12 19V7"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
              ></path>
              <path
                d="M7 12l5-5 5 5"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              ></path>
            </svg>
          </button>
          <div id="messageList" class="message-list">
            <div id="messageListContent" class="message-list-content empty-state">
              Select a conversation from the left side.
            </div>
          </div>
          <button
            id="messageJumpToBottomBtn"
            class="message-jump-button is-hidden"
            type="button"
            title="Jump to latest messages"
            aria-label="Jump to latest messages"
          >
            <span id="messageJumpUnread" class="message-jump-unread">0</span>
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path
                d="M12 5v12"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
              ></path>
              <path
                d="M7 12l5 5 5-5"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              ></path>
            </svg>
          </button>
        </div>

        <form id="composerForm" class="composer composer-shell">
          <div id="composerPreview" class="composer-preview is-hidden"></div>
          <div id="composerReplyBar" class="composer-reply-bar is-hidden"></div>
          <div class="composer-input-row">
            <div class="composer-tools composer-tools-left">
              <button
                id="emojiButton"
                class="ghost-button icon-button"
                type="button"
                title="Emoji"
                aria-label="Emoji"
              >
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <circle
                    cx="12"
                    cy="12"
                    r="9"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                  ></circle>
                  <circle cx="9" cy="10" r="1" fill="currentColor"></circle>
                  <circle cx="15" cy="10" r="1" fill="currentColor"></circle>
                  <path
                    d="M8 14c1.2 1.4 2.5 2 4 2s2.8-.6 4-2"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                  ></path>
                </svg>
              </button>
              <label
                id="attachmentButton"
                class="ghost-button icon-button file-button"
                title="Upload attachment"
                aria-label="Upload attachment"
              >
                <input
                  id="attachmentInput"
                  type="file"
                  accept="image/*,audio/*,video/*,.mp3,.wav,.ogg,.m4a,.aac,.flac,.amr,.mp4,.mov,.m4v,.webm,.mkv,.avi,.pdf,.txt,.doc,.docx,.xls,.xlsx,.ppt,.pptx,.zip,.rar,.7z"
                  multiple
                  hidden
                />
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path
                    d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                  ></path>
                  <polyline
                    points="17 8 12 3 7 8"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                  ></polyline>
                  <line
                    x1="12"
                    y1="3"
                    x2="12"
                    y2="15"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                  ></line>
                </svg>
              </label>
              <div id="emojiPanel" class="emoji-panel is-hidden">
                <div class="emoji-panel-title">QQ Face</div>
                <div class="emoji-panel-body">Coming soon.</div>
              </div>
            </div>
            <div class="composer-editor-shell">
              <div
                id="composerInput"
                class="composer-editor is-disabled"
                contenteditable="false"
                role="textbox"
                aria-multiline="true"
                aria-label="Type a message to the active session"
                data-placeholder="Type a message to the active session"
              ></div>
              <div
                id="composerMentionSuggestions"
                class="composer-mention-suggestions is-hidden"
              ></div>
            </div>
            <div class="composer-tools composer-tools-right">
              <button
                id="recordButton"
                class="ghost-button icon-button record-button"
                type="button"
                title="Record voice"
                aria-label="Record voice"
              >
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path
                    d="M12 15a3 3 0 0 0 3-3V7a3 3 0 1 0-6 0v5a3 3 0 0 0 3 3Z"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                  ></path>
                  <path
                    d="M19 11a7 7 0 0 1-14 0"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                  ></path>
                  <line
                    x1="12"
                    y1="18"
                    x2="12"
                    y2="21"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                  ></line>
                  <line
                    x1="8"
                    y1="21"
                    x2="16"
                    y2="21"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                  ></line>
                </svg>
              </button>
              <button id="sendBtn" class="primary-button" type="submit" disabled>
                Send
              </button>
            </div>
          </div>
        </form>
      </section>

      <aside class="detail-panel">
        <div class="panel-header chat-header detail-header">
          <h2 id="memberPanelTitle">Group Members</h2>
        </div>
        <div id="memberList" class="member-list empty-state">
          Group members will appear here.
        </div>
      </aside>
    </main>

    <div id="profileModal" class="profile-modal is-hidden" aria-hidden="true">
      <button
        id="profileModalBackdrop"
        class="profile-modal-backdrop"
        type="button"
        aria-label="Close profile card"
      ></button>
      <section
        id="profileModalCard"
        class="profile-modal-card"
        role="dialog"
        aria-modal="true"
        aria-labelledby="profileModalName"
      >
        <header class="profile-modal-header">
          <div class="profile-modal-identity">
            <div class="avatar profile-modal-avatar" id="profileModalAvatar">Q</div>
            <div class="profile-modal-copy">
              <strong id="profileModalName">Profile</strong>
              <span id="profileModalMeta">QQ</span>
              <div id="profileModalTags" class="profile-modal-tags"></div>
            </div>
          </div>
          <div class="profile-modal-actions">
            <button
              id="profileModalRefreshBtn"
              class="ghost-button icon-button"
              type="button"
              title="Refresh"
              aria-label="Refresh"
            >
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path
                  d="M20 11a8 8 0 1 0 2.1 5.3"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                ></path>
                <path
                  d="M20 4v7h-7"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                ></path>
              </svg>
            </button>
            <button
              id="profileModalCloseBtn"
              class="ghost-button icon-button"
              type="button"
              title="Close"
              aria-label="Close"
            >
              <span aria-hidden="true">×</span>
            </button>
          </div>
        </header>
        <div id="profileModalStatus" class="profile-modal-status is-hidden"></div>
        <div id="profileModalBody" class="profile-modal-body"></div>
      </section>
    </div>

    <div id="mediaPreviewModal" class="media-preview-modal is-hidden" aria-hidden="true">
      <button
        id="mediaPreviewBackdrop"
        class="media-preview-backdrop"
        type="button"
        aria-label="Close media preview"
      ></button>
      <section
        id="mediaPreviewCard"
        class="media-preview-card"
        role="dialog"
        aria-modal="true"
        aria-labelledby="mediaPreviewTitle"
      >
        <strong id="mediaPreviewTitle" class="media-preview-title">Preview</strong>
        <button
          id="mediaPreviewCloseBtn"
          class="media-preview-close"
          type="button"
          title="Close"
          aria-label="Close"
        >
          <span aria-hidden="true">x</span>
        </button>
        <div id="mediaPreviewBody" class="media-preview-body"></div>
      </section>
    </div>

    <script type="module" src="./app.js"></script>
  </body>
</html>
